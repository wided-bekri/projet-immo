worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting : 10 req/s par IP, burst de 20
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

    upstream immo-api {
        server api:8000;
    }

    # Redirection HTTP -> HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # Serveur HTTPS
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Endpoint de prediction (protege par rate limiting + API key dans FastAPI)
        location /predict {
            limit_req zone=apilimit burst=20 nodelay;

            proxy_pass http://immo-api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Transmet la cle API vers FastAPI
            proxy_pass_header X-API-KEY;
        }

        # Health check (sans rate limiting)
        location /health {
            proxy_pass http://immo-api;
            proxy_set_header Host $host;
        }

        # Infos modele
        location /model/info {
            limit_req zone=apilimit burst=5 nodelay;

            proxy_pass http://immo-api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header X-API-KEY;
        }

        # Metriques Prometheus (acces interne uniquement)
        location /metrics {
            allow 172.0.0.0/8;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://immo-api;
            proxy_set_header Host $host;
        }

        # Statut Nginx pour l exporter Prometheus
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.0.0.0/8;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # Bloque tout le reste
        location / {
            return 404;
        }
    }
}
