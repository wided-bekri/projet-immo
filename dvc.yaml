stages:
  prepare_streamlit_data:
    cmd: python app/prepare_streamlit_data.py
    deps:
      - app/prepare_streamlit_data.py
      - dvf_final_2020_2025_avec_enrichissements_gares.csv
    outs:
      - app/data/streamlit/communes_streamlit.csv
      - app/data/streamlit/evolution_prix_communes.csv
      - app/data/streamlit/carte_prix_departements.csv

  train_baseline:
    cmd: python mlops/train_baseline.py --input notebooks/Models/dvf_clean_model_ready_optimized.csv --target prix_m2
    deps:
      - mlops/train_baseline.py
      - notebooks/Models/dvf_clean_model_ready_optimized.csv
    outs:
      - artifacts/baseline/baseline_metrics.csv

